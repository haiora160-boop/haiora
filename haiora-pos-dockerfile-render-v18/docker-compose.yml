services:
  postgres:
    image: postgres:16
    container_name: pos_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_saas_db
    ports:
      - "5433:5432"
    volumes:
      - pos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_saas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pos_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pos_saas_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pos_user:pos_password@postgres:5432/pos_saas_db?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      WEB_URL: http://localhost:3000
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - pos_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: auto
        NEXT_PUBLIC_SOCKET_URL: auto
    container_name: pos_saas_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: auto
      NEXT_PUBLIC_SOCKET_URL: auto
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pos_postgres_data:
  pos_uploads:
